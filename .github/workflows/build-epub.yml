name: Build EPUB

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: pandoc
          version: 1.0

      - name: Build EPUB
        run: |
          pandoc -o RTW.epub --toc --toc-depth=1 \
            --metadata title="RTW" \
            --metadata author="Dacode45" \
            --metadata lang=en-US \
            $(ls book/CH*.md | sort -V)

      - name: Build Original RTW EPUB
        run: |
          pandoc -o "Original RTW.epub" --toc --toc-depth=1 \
            --metadata title="Original RTW" \
            --metadata author="Dacode45" \
            --metadata lang=en-US \
            $(ls source/chapters/ch*_source.md | sort -V)

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: RTW (latest build)
          files: |
            RTW.epub
            Original RTW.epub
          make_latest: true
          target_commitish: ${{ github.sha }}
