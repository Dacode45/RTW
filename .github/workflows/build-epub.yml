name: Build EPUB

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build EPUB
        run: |
          pandoc -o RTW.epub --toc --toc-depth=1 \
            --metadata title="RTW" \
            --metadata author="Dacode45" \
            --metadata lang=en-US \
            $(ls CH*.md | sort)

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: RTW (latest build)
          files: RTW.epub
          make_latest: true
          target_commitish: ${{ github.sha }}
